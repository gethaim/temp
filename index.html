        update();
        d3.select(this).call(brush.move, null);

    ]);

    const ymid = Math.sqrt(ymin * ymax);
    const ylow = ymid / Math.pow((ymid / ymin), factor);
    const yhigh = ymid * Math.pow((ymax / ymid), factor);

    y.domain([ylow, yhigh]);

    update();
}

</script>
